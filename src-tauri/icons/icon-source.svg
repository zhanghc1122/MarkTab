<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 707 1000" width="707" height="1000">
  <!-- 
    MarkTab Icon - A4 Aspect Ratio (1:√2) - Obsidian Crystalline Edition
    Refined color palette directly inspired by the Obsidian icon:
    Lavender, Violet, Purple, and Midnight Indigo facets.
  -->
  <defs>
    <!-- Stronger shadow for the crystalline slab -->
    <filter id="crystalShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Exact Obsidian-style Facet Gradients -->
    <!-- Top facet: Light lavender to soft violet -->
    <linearGradient id="facetTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    
    <!-- Right facet: Mid violet to deep purple -->
    <linearGradient id="facetRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    
    <!-- Bottom facet: Deep purple to midnight indigo -->
    <linearGradient id="facetBottom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4C1D95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E1B4B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Left facet: Soft violet to mid violet -->
    <linearGradient id="facetLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main Crystalline Body (A4 Ratio) -->
  <g filter="url(#crystalShadow)">
    <!-- Base solid color to prevent gaps -->
    <rect x="40" y="40" width="627" height="920" rx="16" fill="#4C1D95" />
    
    <!-- Obsidian-style Crystalline Facets -->
    <!-- Top Facet (Lavender) -->
    <path d="M 40 40 L 450 40 L 320 400 L 40 320 Z" fill="url(#facetTop)" />
    <!-- Right Facet (Deep Violet) -->
    <path d="M 450 40 L 667 40 L 667 500 L 320 400 Z" fill="url(#facetRight)" />
    <!-- Bottom Facet (Midnight Purple) -->
    <path d="M 667 500 L 667 960 L 300 960 L 320 400 Z" fill="url(#facetBottom)" />
    <!-- Left Facet (Mid Purple) -->
    <path d="M 40 320 L 320 400 L 300 960 L 40 960 Z" fill="url(#facetLeft)" />
    
    <!-- Sharp Crystalline Edge Highlights -->
    <path d="M 40 320 L 320 400 L 667 500" fill="none" stroke="white" stroke-width="2.5" opacity="0.3" />
    <path d="M 320 400 L 300 960" fill="none" stroke="white" stroke-width="1.5" opacity="0.15" />
    <path d="M 450 40 L 320 400" fill="none" stroke="white" stroke-width="1.5" opacity="0.2" />
  </g>

  <!-- High-Contrast White Markdown Hashtag (#) -->
  <g transform="translate(120, 160)" filter="drop-shadow(0 6 12 rgba(0,0,0,0.3))">
    <!-- Vertical bars -->
    <rect x="25" y="0" width="24" height="150" rx="12" fill="white" />
    <rect x="95" y="0" width="24" height="150" rx="12" fill="white" />
    <!-- Horizontal bars -->
    <rect x="0" y="45" width="144" height="24" rx="12" fill="white" />
    <rect x="0" y="88" width="144" height="24" rx="12" fill="white" />
  </g>

  <!-- Abstract Crystalline Content Lines -->
  <g transform="translate(120, 380)" opacity="0.5">
    <rect x="0" y="0" width="450" height="14" rx="7" fill="white" />
    <rect x="0" y="40" width="400" height="14" rx="7" fill="white" />
    <rect x="0" y="80" width="420" height="14" rx="7" fill="white" />
    
    <!-- Code Block facet (Subtle) -->
    <rect x="0" y="140" width="467" height="180" rx="12" fill="white" opacity="0.12" />
    <rect x="30" y="180" width="300" height="10" rx="5" fill="white" opacity="0.4" />
    <rect x="30" y="220" width="380" height="10" rx="5" fill="white" opacity="0.4" />
    <rect x="30" y="260" width="250" height="10" rx="5" fill="white" opacity="0.4" />
  </g>
  
  <!-- Obsidian-style Top-Right Corner Facet -->
  <path d="M 580 40 L 667 127 L 580 127 Z" fill="white" opacity="0.3" />
  <path d="M 667 40 L 667 127 L 580 40 Z" fill="white" opacity="0.1" />
</svg>
